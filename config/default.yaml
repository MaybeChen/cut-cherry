runtime:
  device: auto
  max_workers: 1
  enable_gpu_memory_cleanup: true
pipeline:
  enable_layout: true
  enable_text: true
  enable_formula: true
  enable_table: true
  enable_chart: true
  enable_geometry: true
  enable_sam3: true
  enable_rmbg: true
  enable_vlm: false
  enable_refinement: true
  enable_residual_patches: true
models:
  ocr:
    engine: paddleocr
    lang: ch
    version: PP-OCRv6
    allow_auto_download: false
    enable_mkldnn: false
    cpu_threads: 1
    suppress_startup_logs: true
    det_model_name: PP-OCRv6_medium_det
    rec_model_name: PP-OCRv6_medium_rec
    cls_model_name: PP-LCNet_x0_25_textline_ori
    det_model_dir: models/ocr/ppocrv6_medium_det
    rec_model_dir: models/ocr/ppocrv6_medium_rec
    cls_model_dir: models/ocr/pp_lcnet_x0_25_textline_ori
  layout:
    engine: pp_structure_v3
    allow_auto_download: false
    # Switch engine between pp_structure_v3 and paddleocr_vl here; no separate app config is required.
    paddlex_config: models/layout/pp_structure_v3/PP-StructureV3.yaml
    model_dir: null
    layout_model_dir: models/layout/pp_structure_v3
    pipeline_name: PaddleOCR-VL
    paddleocr_vl_model_dir: models/layout/paddleocr_vl
    use_table_recognition: true
    use_formula_recognition: true
    use_chart_recognition: true
    use_region_detection: true
  sam3:
    enabled: true
    device: cpu
    endpoint: null
    sam3_src_path: sam3_src
    model_path: null
    checkpoint_path: null
    bpe_path: null
    prompts: [icon, logo, image, figure, diagram symbol]
    score_threshold: 0.5
    epsilon_factor: 0.02
    min_area: 100
    return_masks: false
    mask_format: rle
    timeout: 30
  rmbg:
    enabled: true
    model_path: models/rmbg.onnx
  vlm:
    enabled: false
    provider: openai_compatible
    endpoint: null
    model: null
render:
  slide_size_mode: auto
  default_widescreen_ratio: "16:9"
  use_native_charts: true
  use_native_tables: true
  use_native_connectors: true
quality:
  enabled: true
  min_visual_score: 0.90
  min_text_score: 0.95
  max_patch_area_ratio: 0.10
  save_diff_image: true
output:
  root_dir: outputs
  keep_intermediate: true
